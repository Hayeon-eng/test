<!DOCTYPE html>
<html>
<head>
<title>AI Marketing Insight Simulator</title>
</head>

<body>

<h1>AI Marketing Insight Simulator</h1>

<textarea id="text" rows="10" cols="80"></textarea>

<br><br>

<button onclick="run()">Run Analysis</button>

<h2>📊 Data Perspective</h2>
<div id="data"></div>

<h2>🧠 Content Perspective</h2>
<div id="content"></div>

<h2>🏷 Brand Mentions</h2>
<pre id="brands"></pre>

<h2>📊 Topic Clusters</h2>
<pre id="topics"></pre>

<h2>💬 Brand Sentiment</h2>
<pre id="sentiment"></pre>

<h2>🤖 AI Citation Probability</h2>
<div id="citation"></div>

<h2>🔎 AEO Score</h2>
<div id="aeo"></div>

<script>

async function run(){

const text=document.getElementById("text").value

const res=await fetch("http://localhost:8000/analyze",{
method:"POST",
headers:{'Content-Type':'application/json'},
body:JSON.stringify({text})
})

const data=await res.json()

document.getElementById("data").innerText=data.data_perspective
document.getElementById("content").innerText=data.content_perspective
document.getElementById("brands").innerText=JSON.stringify(data.brand_mentions,null,2)
document.getElementById("topics").innerText=JSON.stringify(data.topic_clusters,null,2)
document.getElementById("sentiment").innerText=JSON.stringify(data.brand_sentiment,null,2)
document.getElementById("citation").innerText=data.citation_probability
document.getElementById("aeo").innerText=data.aeo_score

}

</script>

</body>
</html>
