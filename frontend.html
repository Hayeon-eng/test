<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>URL 분석기</title>
<style>
body { font-family: Arial; margin: 30px; }
#container { max-width: 900px; margin: auto; }
input, textarea { width: 100%; padding: 8px; margin: 5px 0; }
button { padding: 10px 20px; margin-top: 10px; }
#comments { margin-top: 20px; border-top: 1px solid #ccc; padding-top: 10px; }
.comment { border-bottom: 1px solid #ddd; padding: 5px 0; }
.analysis { background: #f0f0f0; padding: 5px; margin: 5px 0; white-space: pre-wrap; }
</style>
</head>
<body>
<div id="container">
<h1>URL 분석기</h1>
<label>URL:</label>
<input type="text" id="url" placeholder="URL 입력">
<label>페르소나:</label>
<input type="text" id="persona" placeholder="예: 분석가, UX 전문가">
<label>코멘트 (선택):</label>
<textarea id="comment" rows="2"></textarea>
<button onclick="submitAnalysis()">분석하기</button>
<button id="downloadBtn" onclick="downloadRaw()">RAW DATA DOWNLOAD</button>

<h2>분석 결과</h2>
<div id="analysis"></div>

<h2>댓글 히스토리</h2>
<div id="comments"></div>
</div>

<script src="script.js"></script>
</body>
</html>
