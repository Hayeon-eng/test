<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AI Insight Tool v1.3</title>
<style>
body { font-family: Arial; margin: 20px; }
.container { display: flex; gap: 20px; }
.left { flex: 2; }
.right { flex: 1; border-left: 1px solid #ccc; padding-left: 10px; }
textarea { width: 100%; height: 80px; }
button { margin-top: 5px; }
.comment-box { margin-top: 10px; border-top: 1px solid #eee; padding-top: 5px; }
.summary-section { margin-top: 10px; background: #f9f9f9; padding: 10px; }
</style>
</head>
<body>

<h2>AI Insight Tool v1.3</h2>

<div class="container">
  <div class="left">
    <label>Input type:</label>
    <select id="inputType">
      <option value="text">Text</option>
      <option value="url">URL</option>
      <option value="youtube">YouTube</option>
    </select>

    <textarea id="inputContent" placeholder="Enter text, URL, or YouTube link"></textarea>

    <h4>Persona</h4>
    <input type="text" id="personaName" placeholder="Name">
    <input type="text" id="personaPersonality" placeholder="Personality">

    <button onclick="analyzeContent()">Analyze</button>
    <button id="downloadBtn" onclick="window.location.href='https://test-76hq.onrender.com/download_raw'">RAW DATA DOWNLOAD</button>

    <div class="summary-section">
      <h4>Analysis Summary</h4>
      <div id="dataInsight"></div>
      <div id="contentInsight"></div>
    </div>

    <div class="comment-box">
      <h4>Comments</h4>
      <textarea id="commentInput" placeholder="Add a comment"></textarea>
      <button onclick="addComment()">Add Comment</button>
      <div id="commentsList"></div>
    </div>
  </div>

  <div class="right">
    <h4>Comments Overview</h4>
    <div id="commentSummary"></div>
  </div>
</div>

<script>
const renderURL = "https://test-76hq.onrender.com";

async function analyzeContent() {
  const type = document.getElementById("inputType").value;
  const content = document.getElementById("inputContent").value;
  const persona = {
    name: document.getElementById("personaName").value,
    personality: document.getElementById("personaPersonality").value
  };

  const response = await fetch(renderURL + "/analyze", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({type, content, persona})
  });
  const data = await response.json();
  document.getElementById("dataInsight").innerText = data.analysis.data_insight;
  document.getElementById("contentInsight").innerText = data.analysis.content_insight;
  updateCommentsUI(data.comments);
}

async function addComment() {
  const comment = document.getElementById("commentInput").value;
  if(!comment) return;
  const response = await fetch(renderURL + "/comment", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({comment})
  });
  const data = await response.json();
  updateCommentsUI(data.comments);
  document.getElementById("commentInput").value = "";
}

function updateCommentsUI(comments) {
  const list = document.getElementById("commentsList");
  const summary = document.getElementById("commentSummary");
  list.innerHTML = "";
  summary.innerHTML = "";
  comments.forEach((c,i)=>{
    const el = document.createElement("div");
    el.innerText = `${i+1}. ${c.summary} [${c.sentiment}]`;
    list.appendChild(el);
  });
  summary.innerHTML = `Total Comments: ${comments.length}`;
}
</script>

</body>
</html>
