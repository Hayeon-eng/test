<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>AI 인사이트 툴</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        textarea, input { width: 100%; margin-bottom: 10px; }
        #output { border: 1px solid #ccc; padding: 10px; margin-top: 20px; }
        .section { margin-bottom: 20px; }
    </style>
</head>
<body>
    <h1>AI 소비자 인사이트 툴</h1>

    <div class="section">
        <label>콘텐츠 유형:</label>
        <select id="contentType">
            <option value="text">텍스트</option>
            <option value="url">URL</option>
            <option value="youtube">YouTube</option>
        </select>
        <textarea id="content" rows="4" placeholder="텍스트 또는 URL 입력"></textarea>
    </div>

    <div class="section">
        <label>페르소나 이름:</label>
        <input type="text" id="personaName" placeholder="이름">
        <label>성격/특성:</label>
        <input type="text" id="personaTrait" placeholder="예: 분석적, 창의적">
    </div>

    <button onclick="analyze()">분석 시작</button>

    <div class="section">
        <h2>실시간 코멘트</h2>
        <textarea id="commentInput" rows="2" placeholder="댓글 입력"></textarea>
        <button onclick="addComment()">댓글 추가</button>
        <ul id="commentList"></ul>
    </div>

    <div class="section" id="output"></div>

<script>
async function analyze() {
    const type = document.getElementById("contentType").value;
    const content = document.getElementById("content").value;
    const personaName = document.getElementById("personaName").value;
    const personaTrait = document.getElementById("personaTrait").value;

    const response = await fetch("http://localhost:8000/analyze", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            type: type,
            content: content,
            persona: {name: personaName, trait: personaTrait}
        })
    });
    const data = await response.json();
    document.getElementById("output").innerText = JSON.stringify(data, null, 2);
}

async function addComment() {
    const comment = document.getElementById("commentInput").value;
    const response = await fetch("http://localhost:8000/comment", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({comment})
    });
    const data = await response.json();
    const list = document.getElementById("commentList");
    list.innerHTML = "";
    data.comments.forEach(c => {
        const li = document.createElement("li");
        li.textContent = c;
        list.appendChild(li);
    });
}
</script>
</body>
</html>
