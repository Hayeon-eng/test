<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>AI 토론 시뮬레이터</title>
  <style>
    body { font-family: Arial; margin: 20px; }
    input, textarea { width: 100%; margin-bottom: 10px; }
    .section { margin-top: 20px; }
    .topic { border: 1px solid #ccc; padding: 10px; margin-top: 10px; }
  </style>
</head>
<body>
  <h1>페르소나 & URL 등록</h1>
  <form id="topicForm">
    <input type="text" id="persona" placeholder="페르소나 이름" required>
    <textarea id="persona_desc" placeholder="페르소나 설명 (특성, 선호 등)" rows="2"></textarea>
    <textarea id="urls" placeholder="URL 입력 (쉼표로 구분)" rows="2"></textarea>
    <button type="submit">등록</button>
  </form>

  <div class="section">
    <h2>토론 시뮬레이션</h2>
    <button id="simulateBtn">시뮬레이션 진행</button>
    <div id="results"></div>
  </div>

  <div class="section">
    <h2>Excel 다운로드</h2>
    <button id="downloadBtn">다운로드</button>
  </div>

  <script>
    const form = document.getElementById('topicForm');
    const resultsDiv = document.getElementById('results');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const persona = document.getElementById('persona').value;
      const persona_desc = document.getElementById('persona_desc').value;
      const urls = document.getElementById('urls').value;

      await fetch('/add_topic', {
        method: 'POST',
        body: new URLSearchParams({ persona, persona_desc, urls })
      });
      alert("등록 완료!");
      form.reset();
    });

    document.getElementById('simulateBtn').addEventListener('click', async () => {
      const res = await fetch('/simulate_rounds');
      const data = await res.json();
      resultsDiv.innerHTML = '';
      data.results.forEach(r => {
        const div = document.createElement('div');
        div.classList.add('topic');
        div.innerHTML = `<strong>Data 분석:</strong> ${r.data}<br>
                         <strong>Content 분석:</strong> ${r.content}<br>
                         <strong>토론 예시:</strong><br>${r.discussion.join('<br>')}`;
        resultsDiv.appendChild(div);
      });
    });

    document.getElementById('downloadBtn').addEventListener('click', () => {
      window.location.href = '/download_raw';
    });
  </script>
</body>
</html>
