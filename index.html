<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>자동 토론 플랫폼</title>
<style>
body{font-family:sans-serif;padding:20px;}
input,textarea,button{margin:5px 0;}
#personas,#urls{border:1px solid #ccc;padding:5px;max-height:150px;overflow-y:auto;}
#talks{border:1px solid #ccc;padding:5px;height:200px;overflow-y:auto;margin-top:10px;}
</style>
</head>
<body>

<h2>페르소나 추가</h2>
<form id="personaForm">
<input type="text" id="pName" placeholder="이름" required>
<input type="text" id="pDesc" placeholder="설명" required>
<button type="submit">추가</button>
</form>
<div id="personas"></div>

<h2>URL 추가</h2>
<form id="urlForm">
<input type="url" id="urlInput" placeholder="URL" required>
<button type="submit">추가</button>
</form>
<div id="urls"></div>

<h2>분석 결과</h2>
<div id="analysis">
<p id="dataAnalysis"></p>
<p id="contentAnalysis"></p>
</div>

<h2>자동 토론</h2>
<div id="talks"></div>

<script>
async function fetchPersonas(){ 
  const res = await fetch("/add_persona", {method:"GET"}).catch(()=>null); 
}
async function fetchAnalysis(){
  const res = await fetch("/analysis");
  const data = await res.json();
  document.getElementById("dataAnalysis").innerText = data.data_analysis;
  document.getElementById("contentAnalysis").innerText = data.content_analysis;
}
async function addPersona(e){
  e.preventDefault();
  const name = document.getElementById("pName").value;
  const desc = document.getElementById("pDesc").value;
  const form = new FormData();
  form.append("name", name); form.append("description", desc);
  await fetch("/add_persona",{method:"POST",body:form});
  document.getElementById("pName").value="";document.getElementById("pDesc").value="";
  await fetchAnalysis();
}
async function addUrl(e){
  e.preventDefault();
  const url = document.getElementById("urlInput").value;
  const form = new FormData(); form.append("url", url);
  await fetch("/add_url",{method:"POST",body:form});
  document.getElementById("urlInput").value="";
  await fetchAnalysis();
}
document.getElementById("personaForm").addEventListener("submit", addPersona);
document.getElementById("urlForm").addEventListener("submit", addUrl);

setInterval(fetchAnalysis,30000); // 30초마다 자동 갱신
</script>
</body>
</html>
