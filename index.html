<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Persona 토론 시뮬레이터</title>
<style>
body { font-family: Arial, sans-serif; padding: 20px; }
input, textarea { width: 100%; margin: 5px 0; padding: 8px; }
button { padding: 8px 16px; margin-top: 5px; }
#thread { margin-top: 20px; border-top: 1px solid #ccc; padding-top: 10px; }
.round { margin-bottom: 15px; padding: 5px; border-bottom: 1px dashed #999; }
</style>
</head>
<body>

<h2>Persona 토론 시뮬레이터</h2>

<label>페르소나 특성:</label>
<input type="text" id="persona" placeholder="애플 팬, Gen Z, 디자인 선호 등">

<label>URL/주제 (콤마 구분):</label>
<input type="text" id="urls" placeholder="apple.com, samsung.com">

<button onclick="startTalk()">토론 시작</button>
<button onclick="downloadExcel()">Excel 다운로드</button>

<div id="thread"></div>

<script>
async function startTalk(){
    const persona = document.getElementById("persona").value;
    const urls = document.getElementById("urls").value;
    if(!persona || !urls){ alert("페르소나와 URL을 입력해주세요."); return; }

    const formData = new FormData();
    formData.append("persona", persona);
    formData.append("urls", urls);

    const res = await fetch("/talk", { method: "POST", body: formData });
    const data = await res.json();

    const thread = document.getElementById("thread");
    const div = document.createElement("div");
    div.className = "round";
    div.innerHTML = `<b>${data.summary}</b><br>` +
        data.round.map(r=>`<i>${r.persona}</i> @ ${r.url}: ${r.comment} | Insight: ${r.insight}`).join("<br>");
    thread.prepend(div);
}

function downloadExcel(){
    window.location.href = "/download_raw";
}
</script>

</body>
</html>
