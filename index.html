<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>AI 자동 토론 플랫폼</title>
<style>
body { font-family: Arial; padding: 20px; }
#discussion { border: 1px solid #ccc; height: 300px; overflow-y: scroll; padding: 10px; }
input, button { margin: 5px 0; }
</style>
</head>
<body>
<h2>페르소나 관리</h2>
<input id="persona_name" placeholder="이름"/>
<input id="persona_desc" placeholder="설명"/>
<button onclick="addPersona()">페르소나 추가</button>
<ul id="persona_list"></ul>

<h2>URL 관리</h2>
<input id="url_input" placeholder="URL"/>
<button onclick="addURL()">URL 추가</button>
<ul id="url_list"></ul>

<h2>토론</h2>
<div id="discussion"></div>

<script>
let ws = new WebSocket(`ws://${location.host}/ws/discuss`);
ws.onmessage = (event) => {
    let data = JSON.parse(event.data);
    let div = document.createElement("div");
    div.textContent = `[${data.persona}] ${data.comment}`;
    document.getElementById("discussion").appendChild(div);
};

async function addPersona() {
    let name = document.getElementById("persona_name").value;
    let desc = document.getElementById("persona_desc").value;
    let res = await fetch("/add_persona", {method:"POST", body:new URLSearchParams({name, description: desc})});
    let data = await res.json();
    updatePersonaList(data.personas);
}
function updatePersonaList(list) {
    let ul = document.getElementById("persona_list");
    ul.innerHTML = "";
    list.forEach(p => { let li=document.createElement("li"); li.textContent=p.name + " - " + p.description; ul.appendChild(li); });
}

async function addURL() {
    let url = document.getElementById("url_input").value;
    let res = await fetch("/add_url", {method:"POST", body:new URLSearchParams({url})});
    let data = await res.json();
    updateURLList(data.urls);
}
function updateURLList(list) {
    let ul = document.getElementById("url_list");
    ul.innerHTML = "";
    list.forEach(u => { let li=document.createElement("li"); li.textContent=u; ul.appendChild(li); });
}
</script>
</body>
</html>
