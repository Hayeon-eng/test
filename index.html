<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>AI 자동 토론 플랫폼</title>
<style>
body { font-family: Arial; padding: 20px; }
h2 { margin-top: 20px; }
textarea { width: 100%; height: 80px; }
button { margin-top: 10px; }
ul { list-style-type: none; padding: 0; }
li { margin-bottom: 5px; }
</style>
</head>
<body>
<h1>자동 토론 플랫폼</h1>

<h2>페르소나 등록</h2>
<input type="text" id="nickname" placeholder="닉네임">
<input type="text" id="description" placeholder="설명">
<button onclick="addPersona()">등록</button>

<h2>URL 등록</h2>
<input type="text" id="url" placeholder="URL">
<button onclick="addUrl()">등록</button>

<h2>등록된 페르소나</h2>
<ul id="personaList"></ul>

<h2>등록된 URL</h2>
<ul id="urlList"></ul>

<h2>토론</h2>
<ul id="discussionList"></ul>

<script>
async function fetchPersonas() {
    let res = await fetch("/personas");
    let data = await res.json();
    const ul = document.getElementById("personaList");
    ul.innerHTML = "";
    data.forEach(p => {
        let li = document.createElement("li");
        li.textContent = p.nickname + " : " + p.description;
        ul.appendChild(li);
    });
}

async function addPersona() {
    let nickname = document.getElementById("nickname").value;
    let description = document.getElementById("description").value;
    await fetch("/personas", {
        method: "POST",
        body: new URLSearchParams({nickname, description})
    });
    fetchPersonas();
}

async function fetchUrls() {
    let res = await fetch("/urls");
    let data = await res.json();
    const ul = document.getElementById("urlList");
    ul.innerHTML = "";
    data.forEach(u => {
        let li = document.createElement("li");
        li.textContent = u;
        ul.appendChild(li);
    });
}

async function addUrl() {
    let url = document.getElementById("url").value;
    await fetch("/urls", {
        method: "POST",
        body: new URLSearchParams({url})
    });
    fetchUrls();
}

async function fetchDiscussions() {
    let res = await fetch("/discussions");
    let data = await res.json();
    const ul = document.getElementById("discussionList");
    ul.innerHTML = "";
    data.forEach(d => {
        let li = document.createElement("li");
        li.textContent = `[${d.persona}] ${d.message}`;
        ul.appendChild(li);
    });
}

// 3초마다 자동 갱신
setInterval(fetchDiscussions, 3000);
setInterval(fetchPersonas, 5000);
setInterval(fetchUrls, 5000);

// 초기 로드
fetchPersonas();
fetchUrls();
fetchDiscussions();
</script>
</body>
</html>
