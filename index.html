<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>자동 토론 플랫폼</title>
<style>
body { font-family: Arial; padding: 20px; }
#discussion { border:1px solid #ccc; padding:10px; height:300px; overflow:auto; }
input, button { margin:5px; }
</style>
</head>
<body>
<h2>URL 등록</h2>
<input type="text" id="url_input" placeholder="URL 입력">
<button onclick="registerUrl()">등록</button>

<h2>페르소나 등록</h2>
<input type="text" id="persona_name" placeholder="이름">
<input type="text" id="persona_desc" placeholder="설명">
<button onclick="registerPersona()">등록</button>

<h2>등록 리스트</h2>
<div id="lists">
<p><strong>URLs:</strong> <span id="url_list"></span></p>
<p><strong>Personas:</strong> <span id="persona_list"></span></p>
</div>

<h2>실시간 토론</h2>
<div id="discussion"></div>

<script>
const ws = new WebSocket(`ws://${location.host}/ws`);

ws.onmessage = (event) => {
    const msg = JSON.parse(event.data);
    const div = document.getElementById("discussion");
    div.innerHTML += `<p><strong>${msg.persona}</strong>: ${msg.discussion}<br>
                      <em>${msg.data_analysis}</em><br>
                      <em>${msg.content_analysis}</em></p>`;
    div.scrollTop = div.scrollHeight;
};

async function fetchData() {
    const res = await fetch("/get_data");
    const data = await res.json();
    document.getElementById("url_list").innerText = data.urls.join(", ");
    document.getElementById("persona_list").innerText = data.personas.map(p=>p.name).join(", ");
}
fetchData();

async function registerUrl() {
    const url = document.getElementById("url_input").value;
    await fetch("/register_url", {method:"POST", body:new URLSearchParams({url})});
    document.getElementById("url_input").value="";
    fetchData();
}

async function registerPersona() {
    const name = document.getElementById("persona_name").value;
    const desc = document.getElementById("persona_desc").value;
    await fetch("/register_persona", {method:"POST", body:new URLSearchParams({name, description:desc})});
    document.getElementById("persona_name").value="";
    document.getElementById("persona_desc").value="";
    fetchData();
}
</script>
</body>
</html>
