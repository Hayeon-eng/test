<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>자동 토론 플랫폼</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>자동 토론 플랫폼</h1>

    <div id="registration">
        <h2>페르소나 & URL 등록</h2>
        <form id="regForm">
            <input type="text" name="persona" placeholder="페르소나 이름" required>
            <input type="text" name="persona_desc" placeholder="페르소나 특성" required>
            <input type="url" name="url" placeholder="URL 입력" required>
            <button type="submit">등록</button>
        </form>
    </div>

    <div id="lists">
        <h3>등록된 페르소나</h3>
        <ul id="personaList"></ul>
        <h3>등록된 URL</h3>
        <ul id="urlList"></ul>
    </div>

    <div id="analysis">
        <h2>분석 결과</h2>
        <div id="dataAnalysis"></div>
        <div id="contentAnalysis"></div>
    </div>

    <div id="discussions">
        <h2>자동 토론</h2>
        <ul id="discussionList"></ul>
    </div>

    <script src="script.js"></script>
</body>
</html>
