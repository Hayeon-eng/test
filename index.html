<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>자동 토론 플랫폼</title>
<style>
body { font-family: Arial; padding: 20px; }
section { margin-bottom: 20px; }
textarea { width: 100%; height: 60px; }
button { margin-top: 5px; }
#discussion { border: 1px solid #ccc; padding: 10px; height: 300px; overflow-y: scroll; }
</style>
</head>
<body>
<h1>자동 토론 플랫폼</h1>

<section>
<h2>페르소나 등록</h2>
<input type="text" id="persona_name" placeholder="닉네임">
<input type="text" id="persona_desc" placeholder="설명">
<button onclick="addPersona()">등록</button>
<ul id="persona_list"></ul>
</section>

<section>
<h2>URL 등록</h2>
<input type="text" id="url_input" placeholder="https://">
<button onclick="addURL()">등록</button>
<ul id="url_list"></ul>
</section>

<section>
<h2>토론</h2>
<div id="discussion"></div>
</section>

<script>
async function fetchState() {
    let res = await fetch("/state");
    let data = await res.json();
    // 페르소나/URL 리스트
    let persona_ul = document.getElementById("persona_list");
    persona_ul.innerHTML = "";
    data.personas.forEach(p => {
        let li = document.createElement("li");
        li.textContent = p.name + " (" + p.description + ")";
        persona_ul.appendChild(li);
    });
    let url_ul = document.getElementById("url_list");
    url_ul.innerHTML = "";
    data.urls.forEach(u => {
        let li = document.createElement("li");
        li.textContent = u;
        url_ul.appendChild(li);
    });
    // 토론
    let disc = document.getElementById("discussion");
    disc.innerHTML = "";
    data.discussion_log.forEach(d => {
        let p = document.createElement("p");
        p.textContent = `[${d.persona}] ${d.url} → ${d.message}`;
        disc.appendChild(p);
    });
    disc.scrollTop = disc.scrollHeight;
}

async function addPersona() {
    let name = document.getElementById("persona_name").value;
    let desc = document.getElementById("persona_desc").value;
    if(!name) return alert("닉네임 필요");
    await fetch("/add_persona", {method:"POST", body:new URLSearchParams({name, description: desc})});
    fetchState();
}

async function addURL() {
    let url = document.getElementById("url_input").value;
    if(!url) return alert("URL 필요");
    await fetch("/add_url", {method:"POST", body:new URLSearchParams({url})});
    fetchState();
}

// 5초마다 상태 갱신
setInterval(fetchState, 5000);
fetchState();
</script>
</body>
</html>
